site_name: ML Notes
site_url: https://alexali04.github.io/notes/
theme:
  name: material

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details


extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Statistics:
    - Classical:
      - Distributions: statistics/classical/distributions.md
      - Point Estimation: statistics/classical/point_estimation.md
      - Hypothesis Testing: statistics/classical/hypothesis_testing.md

extra_css:
  - stylesheets/extra.css